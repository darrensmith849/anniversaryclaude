<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="cl-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1b3d"/>
      <stop offset="40%" stop-color="#1a5276"/>
      <stop offset="70%" stop-color="#48a9a6"/>
      <stop offset="100%" stop-color="#e8d5b7"/>
    </linearGradient>
    <linearGradient id="cl-ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b7a"/>
      <stop offset="100%" stop-color="#0e3d47"/>
    </linearGradient>
    <radialGradient id="cl-glint" cx="0.6" cy="0.5" r="0.1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#cl-sky)"/>
  <!-- Sun glint -->
  <circle cx="480" cy="240" r="70" fill="url(#cl-glint)"/>
  <!-- Horizon ocean -->
  <rect x="0" y="300" width="800" height="200" fill="url(#cl-ocean)" opacity="0.8"/>
  <!-- Waves -->
  <path d="M0 340 Q100 330 200 340 Q300 350 400 340 Q500 330 600 340 Q700 350 800 340 L800 360 Q700 350 600 360 Q500 370 400 360 Q300 350 200 360 Q100 370 0 360Z" fill="#48a9a6" opacity="0.3"/>
  <path d="M0 370 Q100 360 200 370 Q300 380 400 370 Q500 360 600 370 Q700 380 800 370 L800 390 Q700 380 600 390 Q500 400 400 390 Q300 380 200 390 Q100 400 0 390Z" fill="#48a9a6" opacity="0.2"/>
  <!-- Sand dunes -->
  <path d="M0 420 Q150 390 300 400 Q450 410 600 395 Q700 388 800 400 L800 500 L0 500Z" fill="#d4b896" opacity="0.8"/>
  <path d="M0 440 Q200 425 400 435 Q600 445 800 430 L800 500 L0 500Z" fill="#c4a882" opacity="0.6"/>
  <!-- Dune grass -->
  <g opacity="0.5" stroke="#8b7355" stroke-width="1" fill="none">
    <path d="M200 410 C195 390 205 385 200 410"/>
    <path d="M203 410 C210 388 196 390 203 410"/>
    <path d="M206 410 C215 392 200 394 206 410"/>
    <path d="M500 402 C495 382 505 378 500 402"/>
    <path d="M503 402 C510 380 496 382 503 402"/>
  </g>
  <!-- Seafoam at shore -->
  <path d="M0 420 Q80 416 160 420 Q240 424 320 418 Q400 414 480 420 Q560 426 640 418 Q720 412 800 418" stroke="#fff" stroke-width="1.5" opacity="0.3" fill="none"/>
</svg>
