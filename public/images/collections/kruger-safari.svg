<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="kr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="30%" stop-color="#4a1942"/>
      <stop offset="60%" stop-color="#c0392b"/>
      <stop offset="85%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#f5deb3"/>
    </linearGradient>
    <radialGradient id="kr-sun" cx="0.5" cy="0.6" r="0.12">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#f39c12" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#kr-sky)"/>
  <circle cx="400" cy="300" r="80" fill="url(#kr-sun)"/>
  <!-- Savanna ground -->
  <rect x="0" y="370" width="800" height="130" fill="#8b6914" opacity="0.5"/>
  <rect x="0" y="400" width="800" height="100" fill="#6b4f12" opacity="0.4"/>
  <!-- Acacia tree left -->
  <line x1="180" y1="380" x2="180" y2="280" stroke="#3d2b1f" stroke-width="4"/>
  <ellipse cx="180" cy="265" rx="70" ry="25" fill="#3d2b1f" opacity="0.85"/>
  <ellipse cx="160" cy="270" rx="50" ry="18" fill="#3d2b1f" opacity="0.7"/>
  <ellipse cx="210" cy="268" rx="45" ry="16" fill="#3d2b1f" opacity="0.7"/>
  <!-- Acacia tree right -->
  <line x1="650" y1="390" x2="650" y2="310" stroke="#3d2b1f" stroke-width="3"/>
  <ellipse cx="650" cy="298" rx="55" ry="20" fill="#3d2b1f" opacity="0.8"/>
  <ellipse cx="635" cy="302" rx="40" ry="14" fill="#3d2b1f" opacity="0.65"/>
  <!-- Elephant silhouette -->
  <g transform="translate(380, 370) scale(0.6)" opacity="0.7">
    <path d="M0 0 C-10 -20 -15 -50 -10 -70 C-5 -85 10 -90 25 -85 C30 -83 35 -78 35 -70 L40 -60 C45 -58 55 -55 60 -50 C65 -45 65 -35 60 -25 C58 -20 55 -15 50 -10 L50 0 L40 0 L40 -8 L30 -8 L30 0 L20 0 L20 -8 L10 -8 L10 0Z" fill="#2c1810"/>
    <!-- Trunk -->
    <path d="M-10 -70 C-18 -60 -22 -45 -15 -35" stroke="#2c1810" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Tusk -->
    <path d="M-5 -55 C-2 -48 2 -44 5 -42" stroke="#f5e6d0" stroke-width="2" fill="none"/>
  </g>
  <!-- Distant hills -->
  <path d="M0 380 L200 350 L400 365 L600 345 L800 370 L800 380Z" fill="#5c3d1e" opacity="0.3"/>
  <!-- Grass tufts -->
  <g opacity="0.4" stroke="#8b7355" stroke-width="1.5" fill="none">
    <path d="M100 420 C105 405 95 405 100 420"/>
    <path d="M102 420 C110 400 96 402 102 420"/>
    <path d="M300 415 C305 400 295 400 300 415"/>
    <path d="M500 425 C505 410 495 410 500 425"/>
    <path d="M700 418 C705 403 695 403 700 418"/>
  </g>
</svg>
