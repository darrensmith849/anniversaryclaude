<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="wl-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="50%" stop-color="#6b3fa0"/>
      <stop offset="80%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#f5deb3"/>
    </linearGradient>
    <linearGradient id="wl-hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5016"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#wl-sky)"/>
  <!-- Distant mountains -->
  <path d="M0 300 L100 220 L200 260 L350 180 L500 240 L600 200 L700 250 L800 220 L800 500 L0 500Z" fill="#3d2066" opacity="0.5"/>
  <!-- Closer hills -->
  <path d="M0 350 L100 300 L250 320 L400 280 L550 310 L700 290 L800 330 L800 500 L0 500Z" fill="url(#wl-hill)" opacity="0.7"/>
  <!-- Vineyard rows -->
  <g opacity="0.6">
    <path d="M50 400 L750 370" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 415 L750 385" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 430 L750 400" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 445 L750 415" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 460 L750 430" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 475 L750 445" stroke="#4a7c23" stroke-width="2"/>
    <path d="M50 490 L750 460" stroke="#4a7c23" stroke-width="2"/>
  </g>
  <!-- Vine posts -->
  <g opacity="0.4">
    <line x1="150" y1="395" x2="150" y2="480" stroke="#5c3d1e" stroke-width="1.5"/>
    <line x1="300" y1="388" x2="300" y2="470" stroke="#5c3d1e" stroke-width="1.5"/>
    <line x1="450" y1="382" x2="450" y2="460" stroke="#5c3d1e" stroke-width="1.5"/>
    <line x1="600" y1="376" x2="600" y2="450" stroke="#5c3d1e" stroke-width="1.5"/>
  </g>
  <!-- Cape Dutch gable -->
  <rect x="340" y="310" width="60" height="40" fill="#f5e6d0" opacity="0.7"/>
  <path d="M335 310 L370 285 L405 310Z" fill="#f5e6d0" opacity="0.7"/>
  <!-- Sun glow -->
  <circle cx="650" cy="200" r="60" fill="#f4a261" opacity="0.2"/>
</svg>
