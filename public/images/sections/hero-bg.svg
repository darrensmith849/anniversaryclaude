<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="h-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="h-glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#6b3fa0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6b3fa0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h-glow2" cx="0.8" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#c2527a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c2527a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h-glow3" cx="0.6" cy="0.2" r="0.3">
      <stop offset="0%" stop-color="#f4a261" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f4a261" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#h-bg)"/>
  <rect width="1200" height="600" fill="url(#h-glow1)"/>
  <rect width="1200" height="600" fill="url(#h-glow2)"/>
  <rect width="1200" height="600" fill="url(#h-glow3)"/>
  <!-- Subtle grain texture via circles -->
  <g opacity="0.03" fill="#fff">
    <circle cx="100" cy="100" r="200"/><circle cx="500" cy="200" r="150"/>
    <circle cx="900" cy="350" r="180"/><circle cx="300" cy="400" r="120"/>
    <circle cx="1000" cy="100" r="100"/>
  </g>
</svg>
