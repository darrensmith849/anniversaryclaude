<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="ar-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="35%" stop-color="#2d1b69"/>
      <stop offset="65%" stop-color="#6b3fa0"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ar-sky)"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="100" cy="60" r="1"/><circle cx="200" cy="40" r="1.2"/>
    <circle cx="350" cy="80" r="0.8"/><circle cx="500" cy="50" r="1"/>
    <circle cx="650" cy="70" r="1.3"/><circle cx="720" cy="30" r="0.8"/>
    <circle cx="150" cy="120" r="0.7"/><circle cx="450" cy="100" r="1"/>
    <circle cx="580" cy="110" r="0.9"/>
  </g>
  <!-- Mountain range back -->
  <path d="M0 350 L100 250 L200 300 L300 200 L400 260 L500 180 L600 240 L700 220 L800 280 L800 500 L0 500Z" fill="#1a0a2e" opacity="0.6"/>
  <!-- Mountain range front -->
  <path d="M0 400 L80 320 L180 360 L280 280 L380 330 L480 270 L550 300 L650 340 L750 310 L800 350 L800 500 L0 500Z" fill="#2d1b4e" opacity="0.7"/>
  <!-- Snow caps -->
  <path d="M280 280 L300 268 L320 280" fill="#e8e8e8" opacity="0.4"/>
  <path d="M480 270 L500 255 L520 270" fill="#e8e8e8" opacity="0.4"/>
  <!-- Trail path -->
  <path d="M350 500 Q360 460 380 430 Q410 400 450 380 Q500 355 520 340" stroke="#c4a882" stroke-width="2" stroke-dasharray="6 4" opacity="0.4" fill="none"/>
  <!-- Clouds -->
  <g opacity="0.15" fill="#fff">
    <ellipse cx="200" cy="200" rx="80" ry="20"/>
    <ellipse cx="170" cy="195" rx="50" ry="15"/>
    <ellipse cx="600" cy="180" rx="60" ry="15"/>
    <ellipse cx="580" cy="175" rx="40" ry="12"/>
  </g>
  <!-- Foreground ridge -->
  <path d="M0 430 Q200 410 400 425 Q600 440 800 420 L800 500 L0 500Z" fill="#3d2b1f" opacity="0.5"/>
  <!-- Moon glow -->
  <circle cx="650" cy="100" r="25" fill="#f5e6d0" opacity="0.8"/>
  <circle cx="650" cy="100" r="35" fill="#f5e6d0" opacity="0.1"/>
</svg>
